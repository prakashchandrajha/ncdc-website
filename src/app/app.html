<div class="relative h-screen">
  <app-header class="absolute top-0 left-0 right-0 z-40"></app-header>
  <app-banner class="h-full"></app-banner>
</div>



<div class="relative h-full w-full flex items-center justify-center mt-10 mb-25">
  <div class="profileCard_container relative p-20">

    @for (item of profileItems; track item.name) {
      <button class="profile_item absolute rounded-full bg-cover cursor-pointer border-2 border-gray-400/50 p-[4px] active:scale-95 hover:scale-95 transition-all duration-500" [ngClass]="item.pos">
        <span class="block w-[80px] h-[80px] transition-all duration-500 rounded-full z-[2] bg-white p-2 overflow-hidden flex items-center justify-center">
          <fa-icon [icon]="item.icon" class="text-base" [ngClass]="item.color"></fa-icon>
        </span>
        <span class="absolute left-1/2 top-full -translate-x-1/2 mt-2 whitespace-nowrap rounded bg-white/85 px-3 py-1 text-[20px] font-medium text-gray-700 shadow-sm">{{ item.name }}</span>
      </button>
    }

    <button class="profile_item w-[400px] h-[400px] p-2 border-4 rounded-full hover:border-gray-400/50 cursor-pointer transition-all duration-500 z-0">
      <div class="w-full bg-white h-full flex flex-col items-center justify-center gap-4 p-4 rounded-full active:scale-95 hover:scale-95 object-cover transition-all duration-500">
        <img [src]="centerBrand.img" alt="{{ centerBrand.name }}" class="w-40 h-40 object-cover rounded-full">
        <span class="text-2xl font-semibold text-gray-800">{{ centerBrand.name }}</span>
      </div>
    </button>
  </div>
</div>

<div class="w-full max-w-5xl mx-auto px-4 py-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">World Map</h2>
  <div #map id="map" class="w-full h-[480px] rounded-lg shadow-lg border border-gray-200" style="width:100%;height:480px;z-index:1;"></div>
</div>
