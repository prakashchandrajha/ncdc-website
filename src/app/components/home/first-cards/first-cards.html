

<div class="relative py-4">
  <div
    class="mx-auto w-full max-w-7xl px-2"
    (mouseenter)="pause()"
    (mouseleave)="resume()"
  >
    <div class="slider-viewport overflow-hidden rounded-xl">
      <div
        class="slider-track flex"
        [style.transform]="'translateX(-' + trackOffsetPx + 'px)'"
      >
        <a
          *ngFor="let brand of brands"
          [href]="brand.link"
          class="brand-card flex flex-col items-center justify-center border border-gray-200 bg-white rounded-lg hover:border-rose-600 transition-colors"
          [style.width.px]="cardWidthPx"
          [style.margin-right.px]="gapPx"
          [style.flex-shrink]="0"
        >
          <div class="mb-2 w-16 aspect-square flex items-center justify-center">
            <img
              class="max-w-full max-h-full object-contain"
              [src]="brand.logoUrl"
              [alt]="brand.name + ' logo'"
              loading="lazy"
            />
          </div>
          <h5 class="text-center text-sm font-medium text-gray-900 group-hover:text-rose-600 truncate w-full px-1 pb-2">
            {{ brand.name }}
          </h5>
        </a>
      </div>
    </div>

    <button
      type="button"
      class="slider-btn slider-btn-prev"
      (click)="prev()"
      [disabled]="!canPrev"
      aria-label="Previous brands"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button
      type="button"
      class="slider-btn slider-btn-next"
      (click)="next()"
      [disabled]="!canNext"
      aria-label="Next brands"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="flex items-center justify-center gap-2 mt-4">
    <button
      *ngFor="let _ of brands.slice(0, totalPages); let i = index"
      type="button"
      class="slider-dot"
      [class.active]="currentPage === i + 1"
      (click)="goTo(i * visibleCount)"
      aria-label="Go to page {{ i + 1 }}"
    ></button>
  </div>
</div>
