<div class="flex items-center justify-center p-2">
  <div class="mx-auto w-full max-w-6xl">
    <div class="grid grid-cols-2 gap-1.5 p-1.5 text-center sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-8">

      <!-- 1. Loan Application Form -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#1E3A5F]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#1E3A5F] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2m0 2v14h14V5zm2 2h10v2H7zm0 4h10v2H7zm0 4h7v2H7z"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Loan Application</h2>
      </a>

      <!-- 2. Finance & Financing -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#2E7D32]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#2E7D32] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8s8 3.59 8 8s-3.59 8-8 8m.31-8.86c-1.77-.45-2.34-.94-2.34-1.67c0-.84.79-1.43 2.1-1.43c1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81c0 1.79 1.49 2.69 3.66 3.21c1.95.46 2.34 1.15 2.34 1.87c0 .8-.69 1.48-2.1 1.48c-1.46 0-2.16-.7-2.2-1.74h-1.7c.05 1.79 1.47 2.72 2.82 3.06V19h1.75v-1.74c1.63-.29 2.77-1.33 2.77-2.85c0-1.75-1.31-2.73-3.28-3.27"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Finance & Financing</h2>
      </a>

      <!-- 3. Activities Assisted -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#C62828]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#C62828] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m-1 17.93c-3.95-.49-7-3.85-7-7.93c0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41c0 2.08-.8 3.97-2.1 5.39"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Activities Assisted</h2>
      </a>

      <!-- 4. Pattern of Assistance -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#F57C00]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#F57C00] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m-2 15l-5-5l1.41-1.41L10 14.17l7.59-7.59L19 8z"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Pattern of Assistance</h2>
      </a>

      <!-- 5. Programme of Activities 2024-25 -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#4527A0]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#4527A0] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2m0 16H5V8h14zM7 10h5v5H7z"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Programme 2024-25</h2>
      </a>

      <!-- 6. Rate of Interest (Fixed) -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#00695C]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#00695C] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m-1 14H9V8h2zm4 0h-2V8h2z"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Rate (Fixed)</h2>
      </a>

      <!-- 7. Rate of Interest (Floating) -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#AD1457]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#AD1457] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8s8 3.59 8 8s-3.59 8-8 8m1-13h-2v6l5.25 3.15L17 12.23l-4-2.37z"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Rate (Floating)</h2>
      </a>

      <!-- 8. Annual Report 2024-25 -->
      <a href="#" class="group relative flex h-[140px] w-full flex-col items-center justify-center overflow-hidden rounded-xl transition-all duration-300 hover:shadow-md">
        <div class="relative z-0 h-[60px] w-[60px] rounded-full">
          <div class="absolute inset-0 translate-z-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-[4] group-hover:bg-[#37474F]"></div>
          <div class="absolute inset-0 z-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-32 text-[#37474F] transition-all duration-500 group-hover:scale-110 group-hover:text-white" viewBox="0 0 24 24"><path fill="currentColor" d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2m-7 0c.55 0 1 .45 1 1s-.45 1-1 1s-1-.45-1-1s.45-1 1-1m4 12h-4v3h-2v-3H8v-2h4V9h2v4h4z"/></svg>
          </div>
        </div>
        <h2 class="z-10 mt-2 text-[10px] font-medium leading-tight transition-all duration-500 group-hover:text-white">Annual Report 24-25</h2>
      </a>

    </div>
  </div>
</div>

<div class="relative py-4">
  <div
    class="mx-auto w-full max-w-7xl px-2"
    (mouseenter)="pause()"
    (mouseleave)="resume()"
  >
    <div class="slider-viewport overflow-hidden rounded-xl">
      <div
        class="slider-track flex"
        [style.transform]="'translateX(-' + trackOffsetPx + 'px)'"
      >
        <a
          *ngFor="let brand of brands"
          [href]="brand.link"
          class="brand-card flex flex-col items-center justify-center border border-gray-200 bg-white rounded-lg hover:border-rose-600 transition-colors"
          [style.width.px]="cardWidthPx"
          [style.margin-right.px]="gapPx"
          [style.flex-shrink]="0"
        >
          <div class="mb-2 w-16 aspect-square flex items-center justify-center">
            <img
              class="max-w-full max-h-full object-contain"
              [src]="brand.logoUrl"
              [alt]="brand.name + ' logo'"
              loading="lazy"
            />
          </div>
          <h5 class="text-center text-sm font-medium text-gray-900 group-hover:text-rose-600 truncate w-full px-1 pb-2">
            {{ brand.name }}
          </h5>
        </a>
      </div>
    </div>

    <button
      type="button"
      class="slider-btn slider-btn-prev"
      (click)="prev()"
      [disabled]="!canPrev"
      aria-label="Previous brands"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button
      type="button"
      class="slider-btn slider-btn-next"
      (click)="next()"
      [disabled]="!canNext"
      aria-label="Next brands"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="flex items-center justify-center gap-2 mt-4">
    <button
      *ngFor="let _ of brands.slice(0, totalPages); let i = index"
      type="button"
      class="slider-dot"
      [class.active]="currentPage === i + 1"
      (click)="goTo(i * visibleCount)"
      aria-label="Go to page {{ i + 1 }}"
    ></button>
  </div>
</div>
