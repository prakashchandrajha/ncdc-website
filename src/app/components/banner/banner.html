<section class="relative h-screen w-full overflow-hidden">

  @for (image of images; track image; let i = $index) {
    <img
      [src]="image"
      [alt]="'Slide ' + (i + 1)"
      class="absolute inset-0 h-full w-full object-cover transition-opacity duration-1000"
      [class.opacity-100]="i === currentIndex()"
      [class.opacity-0]="i !== currentIndex()"
    />
  }

  


  <!-- Previous -->
  <button
    (click)="prev()"
    class="absolute left-5 top-1/2 z-20 -translate-y-1/2 rounded-full bg-black/40 px-4 py-2 text-2xl text-white">
    ‹
  </button>

  <!-- Next -->
  <button
    (click)="next()"
    class="absolute right-5 top-1/2 z-20 -translate-y-1/2 rounded-full bg-black/40 px-4 py-2 text-2xl text-white">
    ›
  </button>

</section>
